name: Bug report
description: Report reproducible incorrect behavior.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        Security issues must use private vulnerability reporting from the
        repository's Security tab.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest commands or project needed to reproduce it.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.14.6"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04, macOS 15, or Windows 11 with WSL"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Remove credentials and other private data before pasting output.
      render: shell
